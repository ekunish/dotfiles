# vim:set ft=tmux:
# catppuccin 内蔵 cpu モジュールを上書き（tmux-cpu 置換に依存しない #(script) 方式）
%hidden MODULE_NAME="cpu"

set -gq "@catppuccin_${MODULE_NAME}_icon" "󰚩 "
set -gqF "@catppuccin_${MODULE_NAME}_color" "#{E:@thm_yellow}"
set -gq "@catppuccin_${MODULE_NAME}_text" " #(~/.tmux/plugins/tmux-cpu/scripts/cpu_percentage.sh)"

# catppuccin 内蔵 cpu.conf が設定した動的色を unset → status_module.conf がデフォルト値を適用
set -gu "@catppuccin_status_${MODULE_NAME}_text_fg"
set -gu "@catppuccin_status_${MODULE_NAME}_text_bg"

source "~/.tmux/plugins/tmux/utils/status_module.conf"
