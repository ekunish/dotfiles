# tmux configuration with Catppuccin theme

# プレフィックスキーをC-bからC-aに変更（必要に応じて）
# unbind C-b
# set -g prefix C-a
# bind C-a send-prefix

# ウィンドウ移動のキーバインド
bind -n C-p previous-window  # Ctrl+p で前のウィンドウへ
bind -n C-n next-window      # Ctrl+n で次のウィンドウへ
bind c new-window -c "#{pane_current_path}"  # 新規ウィンドウで現在のパスを引き継ぐ
bind -n S-Left swap-window -t -1\; select-window -t -1   # Shift+← でウィンドウを左へ移動
bind -n S-Right swap-window -t +1\; select-window -t +1  # Shift+→ でウィンドウを右へ移動

# ペイン分割を直感的なキーに変更
bind | split-window -h -c "#{pane_current_path}"  # | で垂直分割
bind - split-window -v -c "#{pane_current_path}"  # - で水平分割
unbind '"'
unbind %

# ペイン間の移動をVim風に
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ペインサイズ変更（Alt+hjkl）
bind -n M-h resize-pane -L 5
bind -n M-j resize-pane -D 5
bind -n M-k resize-pane -U 5
bind -n M-l resize-pane -R 5

# フローティングウィンドウ（popup）- tmux 3.2+
bind f display-popup -E -w 80% -h 80% -d "#{pane_current_path}"  # 汎用ターミナル
bind g display-popup -E -w 90% -h 90% "lazygit"          # lazygit
bind G display-popup -E -w 90% -h 90% \
  'cd "$(ghq list -p | fzf)" && lazygit'                 # ghq + lazygit
bind e display-popup -E -w 90% -h 90% "yazi"             # yazi (explorer)

# セッションスイッチャー（fzf）
bind S display-popup -E -w 50% -h 50% "tmux list-sessions -F '#{session_name}' | fzf --reverse | xargs tmux switch-client -t"

# スクラッチパッド（トグル式 - 同じキーで開閉、セッション維持）
bind -n M-t display-popup -E -w 80% -h 80% "tmux new-session -A -s scratch"

# Which-key 風キーバインドヘルプ（prefix + Space）
bind Space display-menu -T " Keybindings" -x C -y C \
  "Sessions"               ""  "" \
  "  d  Detach"             d  "detach-client" \
  "  s  Choose Session"     s  "choose-tree -Zs" \
  "  S  fzf Session"         S  "display-popup -E -w 50% -h 50% \"tmux list-sessions -F '#{session_name}' | fzf --reverse | xargs tmux switch-client -t\"" \
  '  $  Rename Session'     $  'command-prompt -I "#S" { rename-session -- "%%" }' \
  "" \
  "Windows"                ""  "" \
  "  c  New Window"         c  "new-window -c '#{pane_current_path}'" \
  "  w  Choose Window"      w  "choose-tree -Zw" \
  "  </>  Swap Window"      ""  "" \
  '  ,  Rename Window'      ,  'command-prompt -I "#W" { rename-window -- "%%" }' \
  "  &  Kill Window"        &  "confirm-before -p 'kill-window #W? (y/n)' kill-window" \
  "" \
  "Panes"                  ""  "" \
  "  -  Horizontal Split"   -  "split-window -v -c '#{pane_current_path}'" \
  "  |  Vertical Split"     |  "split-window -h -c '#{pane_current_path}'" \
  "  z  Zoom Toggle"        z  "resize-pane -Z" \
  "  x  Kill Pane"          x  "confirm-before -p 'kill-pane #P? (y/n)' kill-pane" \
  "  !  Pane → Window"      !  "break-pane" \
  "  <  Rename Pane"       <  'command-prompt -p "(rename-pane)" -I "#T" { select-pane -T "%%" }' \
  "" \
  "Popups"                 ""  "" \
  "  f  Terminal"           f  "display-popup -E -w 80% -h 80% -d '#{pane_current_path}'" \
  "  g  Lazygit"            g  "display-popup -E -w 90% -h 90% lazygit" \
  "  G  ghq + Lazygit"      G  "display-popup -E -w 90% -h 90% 'cd \"$(ghq list -p | fzf)\" && lazygit'" \
  "  e  Yazi"               e  "display-popup -E -w 90% -h 90% yazi" \
  "M-t  Scratchpad"          ""  "" \
  "" \
  "Other"                  ""  "" \
  "  [  Copy Mode"          [  "copy-mode" \
  "  :  Command Prompt"     :  "command-prompt" \
  "  ?  List All Keys"      ?  "list-keys -N" \
  "  r  Reload Config"      r  "source-file ~/.tmux.conf ; display 'Config reloaded!'"

# Performance optimizations for fast startup
set -sg escape-time 0  # Remove escape delay
set -g focus-events on   # Neovim autoread/gitgutter に必要
set -g display-time 10  # Reduce display time
set -g repeat-time 10  # Reduce repeat time
set -g status-interval 10  # Reduce status refresh rate

# マウスサポートを有効化
set -g mouse on

# ウィンドウ番号を1から開始
set -g base-index 1
setw -g pane-base-index 1

# ウィンドウを閉じた時に番号を詰める
set -g renumber-windows on

# 256色端末を使用
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB:Ss=\\E[%p1%d q:Se=\\E[2 q"

# Enable image preview (yazi)
set -g allow-passthrough on
set -ga update-environment TERM
set -ga update-environment TERM_PROGRAM

# Enable clipboard (yazi, OSC 52)
set -g set-clipboard on

# ヒストリーサイズを増やす
set -g history-limit 50000

# セッション終了時にデタッチせず次のセッションへ
set -g detach-on-destroy off

# 複数クライアント接続時の最適化
setw -g aggressive-resize on

# TPM (Tmux Plugin Manager) - 自動インストール
if "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm && ~/.tmux/plugins/tpm/bin/install_plugins'"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'catppuccin/tmux#v2.1.3'
set -g @plugin 'tmux-plugins/tmux-cpu'        # CPU/RAM モニタリング
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-open'
set -g @plugin 'tmux-plugins/tmux-resurrect'   # セッション永続化
set -g @plugin 'tmux-plugins/tmux-continuum'   # 自動保存・復元
set -g @plugin 'rickstaa/tmux-notify'
set -g @plugin 'sainnhe/tmux-fzf'

# Catppuccin theme configuration
set -g @catppuccin_flavor "mocha"
set -g @catppuccin_window_status_style "basic"
set -g @catppuccin_window_flags "none"
set -g @catppuccin_status_background "none"
set -g @catppuccin_status_connect_separator "no"
set -g @catppuccin_session_text "  #S "
set -g @catppuccin_date_time_text "  %H:%M "

# ウィンドウタブに表示するテキスト
set -g @catppuccin_window_text "  #W "
set -g @catppuccin_window_current_text "  #W "

# tmux-yank settings
set -g @yank_selection_mouse 'clipboard'
set -g @yank_action 'copy-pipe-and-cancel'

# tmux-resurrect settings (セッション永続化)
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'

# tmux-continuum settings (自動保存・復元)
set -g @continuum-save-interval '15'
set -g @continuum-restore 'on'

# コピーモードでVimキーバインドを使用
setw -g mode-keys vi

# コピーモードのキーバインド
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# リロード設定
bind r source-file ~/.tmux.conf \; display "Config reloaded!"

# vim-tmux-navigator との連携（Neovimと同じキーで移動）
is_vim="ps -o comm= -t '#{pane_tty}' | grep -q vim"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'
tmux_version='$(tmux -V | sed -En "s/^tmux ([0-9]+(.[0-9]+)?).*/\1/p")'
if-shell -b '[ "$(echo "$tmux_version < 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\'  'select-pane -l'"
if-shell -b '[ "$(echo "$tmux_version >= 3.0" | bc)" = 1 ]' \
    "bind-key -n 'C-\\' if-shell \"$is_vim\" 'send-keys C-\\\\'  'select-pane -l'"

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R
bind-key -T copy-mode-vi 'C-\' select-pane -l

# Initialize TMUX plugin manager
run '~/.tmux/plugins/tpm/tpm'

# コピーモードのスタイル（Catppuccin Mocha - TPM後に設定して上書き）
setw -g mode-style fg='#cdd6f4',bg='#6c7086',bold
setw -g copy-mode-match-style fg='#1e1e2e',bg='#f9e2af'
setw -g copy-mode-current-match-style fg='#1e1e2e',bg='#a6e3a1'
setw -g copy-mode-mark-style fg='#1e1e2e',bg='#b4befe'

# カスタムモジュール（catppuccin読込後に source で上書き）
source "~/dotfiles/tmux/catppuccin-modules/cpu.conf"
source "~/dotfiles/tmux/catppuccin-modules/ram.conf"

# ステータスライン
set -g status-left-length 100
set -g status-right-length 200
set -g status-left "#{E:@catppuccin_status_session}"
set -g status-right "#{E:@catppuccin_status_cpu}"
set -ag status-right "#{E:@catppuccin_status_ram}"
set -ag status-right "#{E:@catppuccin_status_date_time}"

# ペインボーダー（Catppuccin Mocha）
set -g pane-border-style fg='#45475a'
set -g pane-active-border-style fg='#cba6f7'
set -g pane-border-indicators both
set -g pane-border-lines heavy

# ペインボーダーステータス（ペイン識別ラベル）
set -g pane-border-status top
set -g pane-border-format '#{?pane_active,#[fg=#cba6f7]#[bold] #P #{pane_current_command} │ #{b:pane_current_path} #[nobold],#[fg=#45475a] #P #{pane_current_command} │ #{b:pane_current_path} }'

# メニュースタイル（Catppuccin Mocha）
set -g menu-border-lines rounded
set -g menu-style fg='#cdd6f4',bg=default
set -g menu-selected-style fg='#1e1e2e',bg='#cba6f7'
set -g menu-border-style fg='#45475a'
