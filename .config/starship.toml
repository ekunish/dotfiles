# ~/.config/starship.toml — Catppuccin Mocha
# Palette: https://catppuccin.com/palette
#   Rosewater #f5e0dc  Flamingo #f2cdcd  Pink #f5c2e7     Mauve #cba6f7
#   Red #f38ba8        Maroon #eba0ac    Peach #fab387     Yellow #f9e2af
#   Green #a6e3a1      Teal #94e2d5      Sky #89dceb       Sapphire #74c7ec
#   Blue #89b4fa       Lavender #b4befe  Text #cdd6f4      Subtext1 #bac2de
#   Overlay0 #6c7086


[aws]
style = "bold #fab387"

[gcloud]
disabled = true

[battery]
full_symbol = "🔋"
charging_symbol = "🔌"
discharging_symbol = "⚡"

[[battery.display]]
threshold = 30
style = "bold #f38ba8"

[character]
error_symbol = "[👾](bold #f38ba8)"
success_symbol = "[❯](bold #a6e3a1)"

[cmd_duration]
min_time = 10_000
format = " ⏰ [$duration]($style)"
style = "bold #f9e2af"

[directory]
truncation_length = 5
format = "[$path]($style)[$lock_symbol]($lock_style) "
style = "bold #89b4fa"

[git_branch]
format = " [$symbol$branch]($style) "
symbol = " "
style = "bold #cba6f7"

[git_commit]
commit_hash_length = 8
style = "bold #bac2de"

[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '

[git_status]
conflicted = "🚨 "
ahead = "🏎️💨 ${count} "
behind = "🐢 ${count} "
diverged = "🔱 🏎️💨 ${ahead_count} 🐢 ${behind_count} "
untracked = "🚚 ${count} "
stashed = "📦 "
modified = "🏄 ${count} "
staged = "🗃️ ${count} "
renamed = "📛 ${count} "
deleted = "🗑️ ${count} "
style = "bold #f38ba8"
format = "$all_status$ahead_behind"

[hostname]
ssh_only = false
format = "<[$hostname]($style)>"
trim_at = "-"
style = "bold #b4befe"
disabled = true

[julia]
format = "[$symbol$version]($style) "
symbol = "ஃ "
style = "bold #94e2d5"

[memory_usage]
format = "$symbol[${ram}( | ${swap})]($style) "
threshold = 70
style = "bold #6c7086"
disabled = false

[package]
disabled = true

[python]
format = "[$symbol$version]($style) "
style = "bold #89dceb"
symbol = "🐍 "

[nodejs]
format = "[$symbol$version]($style) "
style = "bold #a6e3a1"
symbol = "👽 "

[rust]
format = "[$symbol$version]($style) "
style = "bold #fab387"

[time]
time_format = "%T"
format = "$time($style) "
style = "#bac2de"
disabled = false

[username]
show_always = false
format = "[$user]($style) on "
style_user = "bold #74c7ec"
