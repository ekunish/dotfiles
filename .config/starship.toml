# ~/.config/starship.toml вҖ” Catppuccin Mocha + Emoji Style
# Palette: https://catppuccin.com/palette
#   Rosewater #f5e0dc  Flamingo #f2cdcd  Pink #f5c2e7     Mauve #cba6f7
#   Red #f38ba8        Maroon #eba0ac    Peach #fab387     Yellow #f9e2af
#   Green #a6e3a1      Teal #94e2d5      Sky #89dceb       Sapphire #74c7ec
#   Blue #89b4fa       Lavender #b4befe  Text #cdd6f4      Subtext1 #bac2de
#   Overlay0 #6c7086

# Global format - emoji-based with multi-line prompt
format = """
$os\
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$c\
$golang\
$java\
$nodejs\
$rust\
$python\
$docker_context\
$kubernetes\
$cmd_duration\
$time\
$line_break\
$character"""

scan_timeout = 10
add_newline = true

# в”Җв”Җ Character в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[character]
success_symbol = "[вқҜ](bold #a6e3a1)"
error_symbol = "[рҹ‘ҫ](bold #f38ba8)"
vicmd_symbol = "[вқ®](bold #a6e3a1)"

# в”Җв”Җ OS в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[os]
disabled = false
format = '[$symbol ](bold white)'

[os.symbols]
Windows = "рҹӘҹ"
Ubuntu = "рҹҗ§"
SUSE = "рҹҰҺ"
Raspbian = "рҹҚ“"
Mint = "рҹҢҝ"
Macos = "п…№"
Manjaro = "рҹ”¶"
Linux = "рҹҗ§"
Gentoo = "рҹ—Ҫ"
Fedora = "рҹҺ©"
Alpine = "рҹҸ”пёҸ"
Amazon = "рҹҷӮ"
Android = "рҹӨ–"
Arch = "рҹҸӣпёҸ"
Artix = "рҹҸӣпёҸ"
CentOS = "рҹ’ "
Debian = "рҹҢҖ"
Redhat = "рҹҺ©"
RedHatEnterprise = "рҹҺ©"

# в”Җв”Җ Username / Hostname в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[username]
show_always = false
style_user = "bold #74c7ec"
style_root = "bold #f38ba8"
format = '[$user]($style) '

[hostname]
ssh_only = true
format = '[@$hostname](bold #a6e3a1) '
disabled = false

# в”Җв”Җ Directory в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[directory]
style = "bold #89b4fa"
format = "[$path]($style) "
truncation_length = 3
truncation_symbol = "вҖҰ/"
home_symbol = "рҹҸ "

[directory.substitutions]
"Documents" = "рҹ“„"
"Downloads" = "рҹ“Ҙ"
"Music" = "рҹҺө"
"Pictures" = "рҹ–јпёҸ"
"Developer" = "рҹ’»"

# в”Җв”Җ Git в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[git_branch]
symbol = "рҹҢҝ "
style = "bold #cba6f7"
format = '[$symbol$branch(:$remote_branch)]($style) '

[git_commit]
commit_hash_length = 8
style = "bold #bac2de"

[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '

[git_status]
style = "bold #f38ba8"
format = '([$all_status$ahead_behind]($style) )'
conflicted = "вҡ”пёҸ "
ahead = "в¬ҶпёҸ ${count} "
behind = "в¬ҮпёҸ ${count} "
diverged = "рҹ”Җ "
up_to_date = ""
untracked = "вңЁ ${count} "
stashed = "рҹ“Ұ "
modified = "рҹ“қ ${count} "
staged = "вң… ${count} "
renamed = "рҹ“ӣ ${count} "
deleted = "рҹ—‘пёҸ${count} "

# в”Җв”Җ Languages в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[nodejs]
symbol = "рҹҹў "
style = "bold #a6e3a1"
format = '[$symbol$version]($style) '
version_format = "v${major}.${minor}"

[rust]
symbol = "рҹҰҖ "
style = "bold #fab387"
format = '[$symbol$version]($style) '

[python]
symbol = "рҹҗҚ "
style = "bold #89dceb"
format = '[$symbol${pyenv_prefix}(${version} )(\($virtualenv\))]($style) '

[golang]
symbol = "рҹҗ№ "
style = "bold #94e2d5"
format = '[$symbol$version]($style) '

[java]
symbol = "вҳ• "
style = "bold #f38ba8"
format = '[$symbol$version]($style) '

[c]
symbol = "рҹ”ө "
style = "bold #89b4fa"
format = '[$symbol$version]($style) '

[julia]
format = "[$symbol$version]($style) "
symbol = "а®ғ "
style = "bold #94e2d5"

# в”Җв”Җ Docker / Kubernetes в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[docker_context]
symbol = "рҹҗі "
style = "bold #89b4fa"
format = '[$symbol$context]($style) '
only_with_files = true
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile", "compose.yml", "compose.yaml"]

[kubernetes]
symbol = "вҳёпёҸ "
style = "bold #89b4fa"
format = '[$symbol$context( \($namespace\))]($style) '
disabled = false

# в”Җв”Җ Command Duration в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[cmd_duration]
min_time = 2_000
format = "[took вҸұпёҸ $duration](bold #f9e2af) "
show_milliseconds = false

# в”Җв”Җ Memory Usage в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[memory_usage]
format = "$symbol[$ram_pct]($style) "
threshold = 70
style = "bold #6c7086"
symbol = "рҹ§  "
disabled = false

# в”Җв”Җ Battery в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[battery]
full_symbol = "рҹ”Ӣ"
charging_symbol = "рҹ”Ң"
discharging_symbol = "вҡЎ"

[[battery.display]]
threshold = 30
style = "bold #f38ba8"

# в”Җв”Җ Time в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[time]
disabled = false
time_format = "%H:%M"
style = "#bac2de"
format = 'рҹ•җ [$time]($style) '

# в”Җв”Җ Cloud в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[aws]
format = '[$symbol($profile)(\($region\))(\[$duration\])]($style) '
symbol = "вҳҒпёҸ "
style = "bold #fab387"

[gcloud]
disabled = true

# в”Җв”Җ Other в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
[jobs]
symbol = "вҡҷпёҸ"
style = "bold #f38ba8"
number_threshold = 1
format = "[$symbol$number]($style) "

[package]
symbol = "рҹ“Ұ "
style = "bold #fab387"
format = "[$symbol$version]($style) "
disabled = false

[status]
style = "bg:#f38ba8"
symbol = "вқҢ"
format = '[$symbol $status]($style) '
disabled = false

[terraform]
format = "[$symbol$workspace]($style) "
symbol = "рҹ’  "
style = "bold #cba6f7"

[nix_shell]
symbol = "вқ„пёҸ "
format = '[$symbol$state( \($name\))]($style) '
style = "bold #89b4fa"

[shell]
fish_indicator = "рҹҗ "
powershell_indicator = "вҡЎ"
bash_indicator = "bash"
zsh_indicator = "zsh"
unknown_indicator = "?"
style = "bold #94e2d5"
disabled = true

[line_break]
disabled = false
