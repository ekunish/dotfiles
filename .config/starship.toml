# ~/.config/starship.toml — Catppuccin Mocha + Emoji Style
# Palette: https://catppuccin.com/palette
#   Rosewater #f5e0dc  Flamingo #f2cdcd  Pink #f5c2e7     Mauve #cba6f7
#   Red #f38ba8        Maroon #eba0ac    Peach #fab387     Yellow #f9e2af
#   Green #a6e3a1      Teal #94e2d5      Sky #89dceb       Sapphire #74c7ec
#   Blue #89b4fa       Lavender #b4befe  Text #cdd6f4      Subtext1 #bac2de
#   Overlay0 #6c7086

# Global format - emoji-based with multi-line prompt
format = """
$os\
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$c\
$golang\
$java\
$nodejs\
$rust\
$python\
$docker_context\
$kubernetes\
$cmd_duration\
$time\
$line_break\
$character"""

scan_timeout = 10
add_newline = true

# ── Character ──────────────────────────────────
[character]
success_symbol = "[❯](bold #a6e3a1)"
error_symbol = "[👾](bold #f38ba8)"
vicmd_symbol = "[❮](bold #a6e3a1)"

# ── OS ─────────────────────────────────────────
[os]
disabled = false
format = '[$symbol ](bold white)'

[os.symbols]
Windows = "🪟"
Ubuntu = "🐧"
SUSE = "🦎"
Raspbian = "🍓"
Mint = "🌿"
Macos = ""
Manjaro = "🔶"
Linux = "🐧"
Gentoo = "🗽"
Fedora = "🎩"
Alpine = "🏔️"
Amazon = "🙂"
Android = "🤖"
Arch = "🏛️"
Artix = "🏛️"
CentOS = "💠"
Debian = "🌀"
Redhat = "🎩"
RedHatEnterprise = "🎩"

# ── Username / Hostname ────────────────────────
[username]
show_always = false
style_user = "bold #74c7ec"
style_root = "bold #f38ba8"
format = '[$user]($style) '

[hostname]
ssh_only = true
format = '[@$hostname](bold #a6e3a1) '
disabled = false

# ── Directory ──────────────────────────────────
[directory]
style = "bold #89b4fa"
format = "[$path]($style) "
truncation_length = 3
truncation_symbol = "…/"
home_symbol = "🏠"

[directory.substitutions]
"Documents" = "📄"
"Downloads" = "📥"
"Music" = "🎵"
"Pictures" = "🖼️"
"Developer" = "💻"

# ── Git ────────────────────────────────────────
[git_branch]
symbol = "🌿 "
style = "bold #cba6f7"
format = '[$symbol$branch(:$remote_branch)]($style) '

[git_commit]
commit_hash_length = 8
style = "bold #bac2de"

[git_state]
format = '[\($state( $progress_current of $progress_total)\)]($style) '

[git_status]
style = "bold #f38ba8"
format = '([$all_status$ahead_behind]($style) )'
conflicted = "⚔️ "
ahead = "⬆️${count} "
behind = "⬇️${count} "
diverged = "🔀 "
up_to_date = ""
untracked = "✨ ${count} "
stashed = "📦 "
modified = "📝 ${count} "
staged = "✅ ${count} "
renamed = "📛 ${count} "
deleted = "🗑️${count} "

# ── Languages ──────────────────────────────────
[nodejs]
symbol = "🟢 "
style = "bold #a6e3a1"
format = '[$symbol$version]($style) '
version_format = "v${major}.${minor}"

[rust]
symbol = "🦀 "
style = "bold #fab387"
format = '[$symbol$version]($style) '

[python]
symbol = "🐍 "
style = "bold #89dceb"
format = '[$symbol${pyenv_prefix}(${version} )(\($virtualenv\))]($style) '

[golang]
symbol = "🐹 "
style = "bold #94e2d5"
format = '[$symbol$version]($style) '

[java]
symbol = "☕ "
style = "bold #f38ba8"
format = '[$symbol$version]($style) '

[c]
symbol = "🔵 "
style = "bold #89b4fa"
format = '[$symbol$version]($style) '

[julia]
format = "[$symbol$version]($style) "
symbol = "ஃ "
style = "bold #94e2d5"

# ── Docker / Kubernetes ────────────────────────
[docker_context]
symbol = "🐳 "
style = "bold #89b4fa"
format = '[$symbol$context]($style) '
only_with_files = true
detect_files = ["docker-compose.yml", "docker-compose.yaml", "Dockerfile", "compose.yml", "compose.yaml"]

[kubernetes]
symbol = "☸️ "
style = "bold #89b4fa"
format = '[$symbol$context( \($namespace\))]($style) '
disabled = false

# ── Command Duration ───────────────────────────
[cmd_duration]
min_time = 2_000
format = "[took ⏱️ $duration](bold #f9e2af) "
show_milliseconds = false

# ── Memory Usage ───────────────────────────────
[memory_usage]
format = "$symbol[$ram_pct]($style) "
threshold = 70
style = "bold #6c7086"
symbol = "🧠 "
disabled = false

# ── Battery ────────────────────────────────────
[battery]
full_symbol = "🔋"
charging_symbol = "🔌"
discharging_symbol = "⚡"

[[battery.display]]
threshold = 30
style = "bold #f38ba8"

# ── Time ───────────────────────────────────────
[time]
disabled = false
time_format = "%H:%M"
style = "#bac2de"
format = '🕐 [$time]($style) '

# ── Cloud ──────────────────────────────────────
[aws]
format = '[$symbol($profile)(\($region\))(\[$duration\])]($style) '
symbol = "☁️ "
style = "bold #fab387"

[gcloud]
disabled = true

# ── Other ──────────────────────────────────────
[jobs]
symbol = "⚙️"
style = "bold #f38ba8"
number_threshold = 1
format = "[$symbol$number]($style) "

[package]
symbol = "📦 "
style = "bold #fab387"
format = "[$symbol$version]($style) "
disabled = false

[status]
style = "bg:#f38ba8"
symbol = "❌"
format = '[$symbol $status]($style) '
disabled = false

[terraform]
format = "[$symbol$workspace]($style) "
symbol = "💠 "
style = "bold #cba6f7"

[nix_shell]
symbol = "❄️ "
format = '[$symbol$state( \($name\))]($style) '
style = "bold #89b4fa"

[shell]
fish_indicator = "🐠"
powershell_indicator = "⚡"
bash_indicator = "bash"
zsh_indicator = "zsh"
unknown_indicator = "?"
style = "bold #94e2d5"
disabled = true

[line_break]
disabled = false
