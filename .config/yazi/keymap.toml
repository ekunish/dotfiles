# ============================================================
# Yazi Keymap Configuration
# ============================================================

[mgr]
prepend_keymap = [
  # smart-enter: Enterキーでディレクトリなら中に移動、ファイルなら開く
  { on = "<Enter>", run = "plugin smart-enter", desc = "Enter directory or open file" },

  # 選択したディレクトリにcdして終了 (Shift+Q)
  # ディレクトリを選択している場合はそこに、ファイルの場合は現在のディレクトリにcd
  { on = "Q", run = "plugin cd-to-selected", desc = "cd to selected directory and quit" },
]
